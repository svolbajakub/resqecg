<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ResqECG® AI</title>
    
    <link rel="apple-touch-icon" href="icon.png">
    
    <style>
        :root {
            --resq-blue: #007AFF;
            --resq-red: #ff3b30;
            --resq-gray-light: #f2f2f7;
            --resq-gray-mid: #d1d1d6;
            --resq-text-muted: #8e8e93;
            --resq-card: #ffffff;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background-color: #ffffff;
            color: #000;
            margin: 0;
            padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
            -webkit-font-smoothing: antialiased;
        }

        /* Centered Clean Header */
        header {
            padding: 25px 20px 25px 20px; /* Více místa bez podnadpisu */
            text-align: center;
            background: #ffffff;
            position: relative;
            border-bottom: 1px solid var(--resq-gray-light);
        }
        .logo {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -1.2px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        .logo span { color: var(--resq-blue); }

        .container { padding: 0 20px 40px 20px; }

        /* Karty s Pedi stínem */
        .card {
            background: var(--resq-card);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            margin-top: 25px;
            border: 1px solid rgba(0,0,0,0.02);
        }

        /* iPhone Button Style */
        .btn {
            width: 100%;
            padding: 18px;
            border-radius: 18px;
            border: none;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-primary { background: var(--resq-blue); color: white; }
        .btn-outline { 
            background: var(--resq-gray-light); 
            color: #000; 
            margin-top: 20px; /* Větší mezera od výsledků */
        }
        .btn:active { transform: scale(0.96); }

        /* Preview area */
        #previewContainer {
            width: 100%;
            height: 220px;
            background: var(--resq-gray-light);
            border-radius: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border: 1px dashed var(--resq-gray-mid);
            position: relative;
        }
        #imgPreview { width: 100%; height: 100%; object-fit: cover; display: none; }
        .placeholder-text {
            color: #444;
            font-weight: 800;
            text-align: center;
            font-size: 16px;
        }

        /* Loader */
        #loader {
            display: none; text-align: center; padding: 40px 20px;
        }
        .spinner {
            width: 35px; height: 35px;
            border: 4px solid var(--resq-gray-light);
            border-top: 4px solid var(--resq-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Detailní výsledky v DNA PNP */
        .diag-box {
            padding: 20px;
            border-radius: 18px;
            margin-bottom: 20px;
            font-weight: 800;
            font-size: 20px;
            text-align: center;
            line-height: 1.3;
        }
        
        .results-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .result-item {
            background: var(--resq-gray-light);
            padding: 12px;
            border-radius: 14px;
        }
        .result-label { font-size: 10px; font-weight: 800; color: var(--resq-text-muted); text-transform: uppercase; }
        .result-val { font-size: 15px; font-weight: 700; color: #000; margin-top: 2px; }
        
        .full-width { grid-column: span 2; }
        .description-text {
            font-size: 14px;
            line-height: 1.5;
            color: #333;
            margin-top: 8px;
            white-space: pre-wrap; /* Zachová formátování AI */
        }

        /* Gear a Modal */
        #settingsBtn { position: absolute; top: 30px; left: 20px; font-size: 20px; cursor: pointer; opacity: 0.3; }
        #modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.4);
            display: none; align-items: center; justify-content: center; z-index: 1000;
            backdrop-filter: blur(5px);
        }
        .modal-content { background: white; width: 85%; padding: 30px; border-radius: 30px; }
        input { width: 100%; padding: 16px; border-radius: 14px; border: 1px solid var(--resq-gray-mid); margin: 20px 0; font-size: 16px; outline: none; }
    </style>
</head>
<body>

    <header>
        <div id="settingsBtn" onclick="openSettings()">⚙️</div>
        <div class="logo">Resq<span>ECG</span>® </div>
    </header>

    <div class="container">
        <div class="card" id="inputCard">
            <div id="previewContainer">
                <div id="phIcon" class="placeholder-text">📷<br>KLEPNI PRO FOTO EKG</div>
                <img id="imgPreview">
            </div>
            <input type="file" id="fileInput" accept="image/*" capture="camera" style="display:none" onchange="processFile(event)">
            <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">NAHRÁT EKG SOUBOR</button>
        </div>

        <div id="loader">
            <div class="spinner"></div>
            <div id="loaderStatus" style="font-weight: 700; font-size: 14px; color: var(--resq-blue);">PNP ANALÝZA...</div>
        </div>

        <div id="resultCard" style="display:none">
            <div class="card">
                <div id="diagBox" class="diag-box">--</div>
                
                <div class="results-grid">
                    <div class="result-item"><div class="result-label">Rytmus</div><div class="result-val" id="r-ryt">--</div></div>
                    <div class="result-item"><div class="result-label">Akce</div><div class="result-val" id="r-akce">--</div></div>
                    <div class="result-item"><div class="result-label">TF</div><div class="result-val" id="r-tf">--</div></div>
                    <div class="result-item"><div class="result-label">Elektrická osa</div><div id="r-osa" class="result-val">--</div></div>
                    <div class="result-item"><div class="result-label">QRS (převod)</div><div id="r-qrs" class="result-val">--</div></div>
                    <div class="result-item"><div class="result-label">ST Úsek (ischemie)</div><div id="r-st" class="result-val">--</div></div>
                    
                    <div class="result-item full-width">
                        <div class="result-label">Klinické zhodnocení (PNP)</div>
                        <div id="r-desc" class="description-text">--</div>
                    </div>
                </div>

                <button class="btn btn-outline" onclick="reset()">🔄 NOVÁ ANALÝZA</button>
            </div>
        </div>
    </div>

    <div id="modal" onclick="closeSettings()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 style="margin:0; font-weight:800">API Konfigurace</h3>
            <input type="text" id="apiInput" placeholder="Vložte Gemini API klíč">
            <button class="btn btn-primary" onclick="saveKey()">ULOŽIT KLÍČ</button>
        </div>
    </div>

<script>
    let b64 = "";
    
    function openSettings() { document.getElementById('modal').style.display = 'flex'; document.getElementById('apiInput').value = localStorage.getItem('resq_key') || ''; }
    function closeSettings() { document.getElementById('modal').style.display = 'none'; }
    function saveKey() { localStorage.setItem('resq_key', document.getElementById('apiInput').value.trim()); closeSettings(); }
    function reset() { document.getElementById('resultCard').style.display = 'none'; document.getElementById('inputCard').style.display = 'block'; document.getElementById('imgPreview').style.display = 'none'; document.getElementById('phIcon').style.display = 'block'; }

    function processFile(e) {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = (re) => {
            b64 = re.target.result.split(',')[1];
            document.getElementById('imgPreview').src = re.target.result;
            document.getElementById('imgPreview').style.display = 'block';
            document.getElementById('phIcon').style.display = 'none';
            analyze();
        };
        reader.readAsDataURL(file);
    }

    async function analyze() {
        const key = localStorage.getItem('resq_key'); if (!key) { openSettings(); return; }
        
        document.getElementById('inputCard').style.display = 'none';
        document.getElementById('loader').style.display = 'block';
        const status = document.getElementById('loaderStatus');

        try {
            // Ghost Protocol - Detekce modelů
            status.innerText = "VYHLEDÁVÁM AI MODEL v1.5 Flash...";
            const list = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
            const listData = await list.json();
            const model = listData.models?.find(m => m.supportedGenerationMethods.includes("generateContent") && m.name.includes("1.5"))?.name;

            if (!model) throw new Error("API klíč nemá přístup k Gemini 1.5.");

            status.innerText = "PROBÍHÁ PROFESIONÁLNÍ ANALÝZA...";
            const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/${model}:generateContent?key=${key}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [
                        { text: "Jsi kardiolog. Analyzuj EKG fotku pro PNP. Buď stručný, technický a věcný. Odpověz POUZE JSON: {\"tf\":\"..\",\"rytmus\":\"..\",\"qrs\":\"..\",\"st\":\"..\",\"diagnoza\":\"..\",\"popis\":\"..\",\"akce\":\"..\",\"osa\":\"..\"}" },
                        { inlineData: { mimeType: "image/jpeg", data: b64 } }
                    ]}]
                })
            });

            const data = await resp.json();
            if (!resp.ok) throw new Error(data.error.message);
            
            const raw = data.candidates[0].content.parts[0].text.replace(/```json|```/gi, "").trim();
            const res = JSON.parse(raw);

            render(res);
        } catch (e) {
            alert("Chyba analýzy. Zkontroluj klíč a foto. Chyba: " + e.message);
            reset();
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    }

    function render(res) {
        document.getElementById('resultCard').style.display = 'block';
        document.getElementById('r-tf').innerText = res.tf;
        document.getElementById('r-ryt').innerText = res.rytmus;
        document.getElementById('r-akce').innerText = res.akce;
        document.getElementById('r-osa').innerText = res.osa;
        document.getElementById('r-qrs').innerText = res.qrs;
        document.getElementById('r-st').innerText = res.st;
        document.getElementById('r-desc').innerText = res.popis;
        
        const dBox = document.getElementById('diagBox');
        dBox.innerText = res.diagnoza;
        
        // Vizuální varování (barva) ponecháno, ale bez akce
        const isBad = ["stemi", "infarkt", "arytmie", "blok", "tachykardie", "fibrilace", "elevace", "deprese"].some(kw => (res.diagnoza + res.popis).toLowerCase().includes(kw));
        dBox.style.background = isBad ? 'rgba(255,59,48,0.1)' : 'rgba(76,217,100,0.1)';
        dBox.style.color = isBad ? 'var(--resq-red)' : '#248a3d';
    }
</script>
</body>
</html>
